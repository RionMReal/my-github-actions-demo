name: Build Test and Push

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t testapi .

      - name: Run tests
        run: docker run testapi pytest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker image
        run: |
          docker tag testapi ${{ secrets.DOCKER_USERNAME }}/testapi:dev-${{ github.run_number }}
          docker tag testapi ${{ secrets.DOCKER_USERNAME }}/testapi:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/testapi:dev-${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/testapi:latest
